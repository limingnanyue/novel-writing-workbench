<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>LLM Gateway v5.2</title>
<link rel="manifest" href="/static/manifest.json">
<style>
/* ═══════ taste-skill v2 DIALS: 5/3/5 ═══════ */
:root{
  --bg:#0a0a0f;--s1:#0e0e15;--s2:#12121b;--s3:#181827;--bd:#22223a;--be:#2a2a48;
  --ac:#5b8af7;--a2:#4060c0;--su:#36c073;--wa:#e8a32b;--da:#e0556a;--in:#6b9ff6;
  --t1:#d0d0e8;--t2:#7878a0;--t3:#484870;
  --r:8px;--rs:5px;
  --font:-apple-system,'Inter','PingFang SC','Microsoft YaHei',sans-serif;
  --fm:'JetBrains Mono','SF Mono','Fira Code',monospace;
  --tr:.12s ease;
  --sidebar-w:220px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--t1);height:100%;overflow:hidden;
  -webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

/* ═══ App Shell ═══ */
.app{display:flex;height:100%;max-width:480px;margin:0 auto;position:relative;flex-direction:column}
.stbar{display:flex;align-items:center;gap:6px;padding:4px 14px;height:32px;
  padding-top:env(safe-area-inset-top,0);background:var(--bg);flex-shrink:0;z-index:20;
  font-size:.5rem;font-family:var(--fm)}
.stbar .st-l{flex:1;color:var(--t3)}.stbar .st-r{display:flex;gap:8px;align-items:center;color:var(--t3)}
.dot{width:5px;height:5px;border-radius:50%}.dot.on{background:var(--su)}.dot.off{background:var(--da)}

/* Pages */
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
.page.active{display:flex;flex-direction:column}
.pi{padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0) + 56px)}

/* Tab Bar — mobile bottom */
.tabbar{display:flex;background:var(--s1);border-top:1px solid var(--bd);flex-shrink:0;z-index:20;
  padding-bottom:env(safe-area-inset-bottom,0);height:calc(56px + env(safe-area-inset-bottom,0))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  border:none;background:transparent;color:var(--t3);font-size:.42rem;font-family:var(--fm);
  cursor:pointer;transition:color var(--tr)}.tab .tic{font-size:1rem}.tab.active{color:var(--ac)}.tab:active{opacity:.7}

/* ═══ Dashboard ═══ */
.hero h1{font-size:.7rem;font-weight:700;letter-spacing:-.01em}
.hero .sub{font-size:.45rem;color:var(--t3);font-family:var(--fm);margin:3px 0 10px}
.stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:10px}
.stat{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 6px;text-align:center}
.stat .sv{font-size:.8rem;font-weight:700;color:var(--ac);font-family:var(--fm)}
.stat .sl{font-size:.4rem;color:var(--t3);margin-top:2px;font-family:var(--fm)}
.sec{display:flex;align-items:center;gap:6px;margin:12px 0 6px}
.sec .st{font-size:.5rem;font-weight:600;color:var(--ac);font-family:var(--fm)}.sec .st::before{content:'> ';font-weight:700}
.sec .sa{margin-left:auto;font-size:.42rem;color:var(--t3);font-family:var(--fm)}

/* Provider Cards */
.pcard{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:8px 10px;margin-bottom:4px;
  cursor:pointer;transition:all var(--tr)}.pcard:active,.pcard:hover{border-color:var(--ac)}
.pcard.sel{border-color:var(--ac);background:var(--s3)}
.pcard .pr{display:flex;align-items:center;gap:7px}
.pcard .pav{width:30px;height:30px;border-radius:7px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0}
.pcard .pi{flex:1;min-width:0}
.pcard .pn{font-size:.52rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard .pu{font-size:.4rem;color:var(--t3);font-family:var(--fm);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard .badge{font-size:.36rem;padding:2px 6px;border-radius:5px;font-family:var(--fm);white-space:nowrap}
.pcard .badge.ok{background:var(--su);color:#000}.pcard .badge.err{background:var(--da);color:#fff}.pcard .badge.info{background:var(--in);color:#000}
.pcard .chev{color:var(--t3);font-size:.5rem;flex-shrink:0}
.pcard .pa{display:flex;gap:5px;margin-top:6px;padding-top:6px;border-top:1px solid var(--bd)}
.pcard .pa button{flex:1}

/* ═══ Detail Panel (desktop right side) ═══ */
.detail-panel{display:none}
.detail-panel-inner{padding:0 20px 20px}
.detail-panel .dp-head{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--bd)}
.detail-panel .dp-head h3{font-size:.65rem;font-weight:600;font-family:var(--fm)}
.detail-panel .dp-meta{font-size:.45rem;color:var(--t3);font-family:var(--fm);margin-bottom:12px}

/* Sheets — mobile bottom */
.overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);animation:ov-in .15s ease}
.overlay.show{display:block}
.sheet{position:fixed;bottom:0;left:50%;transform:translate(-50%,100%);width:100%;max-width:480px;
  max-height:82vh;background:var(--s1);border:1px solid var(--bd);border-radius:14px 14px 0 0;
  z-index:101;display:flex;flex-direction:column;transition:transform .22s cubic-bezier(.4,0,.2,1)}
.sheet.show{transform:translate(-50%,0)}
.sh{width:32px;height:4px;border-radius:2px;background:var(--bd);margin:8px auto 0;flex-shrink:0}
.shead{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--bd);flex-shrink:0}
.shead h4{font-size:.58rem;font-weight:600;font-family:var(--fm)}
.sclose{width:26px;height:26px;border-radius:5px;border:none;background:var(--s3);color:var(--t2);cursor:pointer;font-size:.6rem}
.sbody{flex:1;overflow-y:auto;padding:8px 14px;-webkit-overflow-scrolling:touch}

/* Model list */
.mlist{display:flex;flex-direction:column;gap:1px}
.mitem{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:var(--rs);font-size:.45rem;font-family:var(--fm)}
.mitem:nth-child(odd){background:var(--s2)}
.mitem .mid{flex:1;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mitem .mby{font-size:.38rem;color:var(--t3)}

/* Forms */
.fg{margin-bottom:7px}.fg label{display:block;font-size:.45rem;color:var(--t2);font-family:var(--fm);margin-bottom:3px}
.inp{width:100%;padding:7px 10px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--s2);color:var(--t1);
  font-size:.52rem;outline:none;font-family:var(--font);transition:border-color var(--tr)}
.inp:focus{border-color:var(--ac)}.inp::placeholder{color:var(--t3);font-size:.45rem}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:6px 12px;border-radius:var(--rs);
  font-size:.48rem;cursor:pointer;font-family:var(--fm);background:var(--s3);color:var(--t1);
  border:1px solid var(--bd);transition:all var(--tr);white-space:nowrap}
.btn:active{transform:scale(.97)}.btn.pri{background:var(--ac);color:#fff;border-color:var(--a2)}
.btn.dan{background:transparent;border-color:var(--da);color:var(--da)}
.btn.full{width:100%}.btn.sm{padding:3px 8px;font-size:.4rem}
.btn .bic{font-size:.65rem}

/* Toast */
.toast{position:fixed;top:40px;left:50%;transform:translate(-50%,-20px);
  background:var(--s3);border:1px solid var(--bd);color:var(--t1);padding:6px 12px;
  border-radius:16px;font-size:.45rem;font-family:var(--fm);z-index:200;opacity:0;
  transition:all .2s ease;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translate(-50%,0)}.toast.good{color:var(--su)}.toast.bad{color:var(--da)}

/* Misc */
.empty{text-align:center;padding:20px 0;color:var(--t3);font-size:.45rem;font-family:var(--fm)}
.result{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:8px 10px;margin-top:6px;font-size:.45rem;font-family:var(--fm);line-height:1.6;color:var(--t2);white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto}
.result.ok{border-color:var(--su)}.result.err{border-color:var(--da)}
.skel{background:linear-gradient(90deg,var(--s2)25%,var(--s3)50%,var(--s2)75%);background-size:200% 100%;
  animation:skel 1.5s infinite;border-radius:var(--rs)}@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
.pulse{animation:pulse 1.5s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes ov-in{from{opacity:0}}

/* ═══ Chat / Writing ═══ */
.chat-wrap{display:flex;flex-direction:column;flex:1;min-height:0}
.chat-body{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:3px}
.chat-empty-w{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--t3)}
.chat-empty-w .ce-ic{font-size:2rem;opacity:.2}.chat-empty-w .ce-t{font-size:.6rem;color:var(--t2);font-weight:600}
.chat-empty-w .ce-s{font-size:.42rem;max-width:240px;text-align:center;line-height:1.5}
.msg{display:flex;gap:6px;max-width:88%;animation:msg-in .15s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.assistant{align-self:flex-start}
.msg .m-av{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.5rem}
.msg.user .m-av{background:var(--s3);color:var(--t2)}
.msg.assistant .m-av{background:rgba(91,138,247,.1);color:var(--ac)}
.msg .m-bub{padding:6px 10px;border-radius:10px;font-size:.5rem;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg.user .m-bub{background:var(--s3);border:1px solid var(--bd);color:var(--t1);border-bottom-right-radius:3px}
.msg.assistant .m-bub{background:var(--s2);border:1px solid var(--bd);color:var(--t1);border-bottom-left-radius:3px}
.msg .m-time{font-size:.35rem;color:var(--t3);margin-top:2px;font-family:var(--fm)}
.typing-dots{display:flex;gap:3px;padding:6px 10px}.typing-dots span{width:4px;height:4px;border-radius:50%;background:var(--t3);animation:typeb 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes typeb{0%,60%,100%{opacity:.2;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}
@keyframes msg-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.chips-row{display:flex;gap:3px;padding:6px 0;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
.chips-row::-webkit-scrollbar{height:0}
.chip-w{flex-shrink:0;padding:3px 8px;border-radius:8px;font-size:.4rem;border:1px solid var(--bd);cursor:pointer;background:var(--s2);color:var(--t2);font-family:var(--fm);white-space:nowrap;transition:all var(--tr)}
.chip-w:active{background:var(--s3);border-color:var(--ac);color:var(--ac)}
.chat-foot{flex-shrink:0;padding:6px 0 0;border-top:1px solid var(--bd)}
.chat-inp{display:flex;align-items:flex-end;gap:5px}
.chat-inp textarea{flex:1;padding:7px 10px;border-radius:10px;border:1px solid var(--bd);background:var(--s2);color:var(--t1);font-size:.5rem;resize:none;outline:none;font-family:var(--font);line-height:1.5;max-height:90px}
.chat-inp textarea:focus{border-color:var(--ac)}
.chat-inp .snd{width:30px;height:30px;border-radius:50%;border:none;background:var(--ac);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.6rem;flex-shrink:0}.chat-inp .snd:disabled{background:var(--s3);color:var(--t3)}
.writing-panel{flex:1;overflow-y:auto}
@media(min-width:768px){
  .chat-body{gap:4px}.msg .m-bub{font-size:.52rem}.msg .m-av{width:28px;height:28px}
  .chat-inp textarea{font-size:.52rem}.chip-w{font-size:.42rem}
}

/* ═══════════════════════════════════════
   DESKTOP — 768px+
   Sidebar + Main + Detail Panel
   ═══════════════════════════════════════ */
@media(min-width:768px){
  .app{max-width:100%;flex-direction:row}
  /* Sidebar */
  .stbar{display:none}
  .sidebar{display:flex!important;flex-direction:column;width:var(--sidebar-w);background:var(--s1);
    border-right:1px solid var(--bd);flex-shrink:0;z-index:10}
  .sidebar .sb-brand{padding:16px 16px 12px;border-bottom:1px solid var(--bd)}
  .sidebar .sb-brand .sbn{font-size:.6rem;font-weight:700;font-family:var(--fm);color:var(--ac)}
  .sidebar .sb-brand .sbv{font-size:.4rem;color:var(--t3);font-family:var(--fm);margin-top:2px}
  .sidebar .sb-stats{display:flex;gap:6px;padding:8px 16px;font-size:.4rem;color:var(--t3);font-family:var(--fm);border-bottom:1px solid var(--bd)}
  .sidebar .sb-stats .ss-dot{margin-right:auto}
  /* Sidebar tabs */
  .sidebar .sbtabs{flex:1;padding:8px 0}
  .sbtab{display:flex;align-items:center;gap:8px;width:100%;padding:8px 16px;border:none;background:transparent;
    color:var(--t3);font-size:.48rem;font-family:var(--fm);cursor:pointer;transition:all var(--tr);text-align:left}
  .sbtab .si{font-size:.8rem}.sbtab.active{color:var(--ac);background:rgba(91,138,247,.06)}
  .sbtab:hover{background:var(--s2)}
  .sidebar .sb-foot{padding:10px 16px;border-top:1px solid var(--bd)}
  /* Tabbar — hide on desktop */
  .tabbar{display:none}
  /* Pages — right area */
  .pages{flex:1;min-width:0}
  .page .pi{padding:16px 24px 24px}
  /* Stats row */
  .stat3{gap:8px;margin-bottom:14px}.stat{padding:14px 10px}.stat .sv{font-size:1.1rem}.stat .sl{font-size:.45rem}
  /* Provider cards — grid */
  .hero h1{font-size:.85rem}.hero .sub{font-size:.5rem}
  /* Desktop: show provider list + detail side-by-side */
  .desk-layout{display:flex;gap:0;height:100%}
  .desk-list{width:340px;border-right:1px solid var(--bd);overflow-y:auto;padding:16px;flex-shrink:0}
  .desk-list .pcard{margin-bottom:3px}
  .detail-panel{flex:1;overflow-y:auto;display:flex;flex-direction:column}
  .detail-panel .dp-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:.5rem;font-family:var(--fm);flex-direction:column;gap:8px}
  .detail-panel .dp-empty .dpe-ic{font-size:2rem;opacity:.2}
  /* Hide mobile-specific */
  .sh,.shead{display:none}
  /* Desktop sheet = right panel overlay */
  .overlay.show{display:none}  /* no overlay on desktop */
  .sheet{position:static;transform:none;max-width:none;max-height:none;border-radius:0;border:none;height:100%}
  .sbody{padding:16px 24px}
  .sclose{display:none}
  .btn.sm{padding:4px 10px;font-size:.42rem}
  .sec .st{font-size:.55rem}.sec .sa{font-size:.45rem}
  .pcard .pn{font-size:.55rem}.pcard .pu{font-size:.42rem}
  .mitem{font-size:.48rem}.mitem .mby{font-size:.4rem}
  .result{font-size:.48rem;max-height:300px}
}

/* ═══════════════════════════════════════
   WIDE DESKTOP — 1200px+
   ═══════════════════════════════════════ */
@media(min-width:1200px){
  :root{--sidebar-w:260px}
  .desk-list{width:380px}
  .stat3{grid-template-columns:repeat(3,1fr)}.stat .sv{font-size:1.3rem}
  .hero h1{font-size:1rem}
}
</style>
</head>
<body>

<!-- ═══ DESKTOP SIDEBAR ═══ -->
<div class="sidebar" id="sidebar">
  <div class="sb-brand"><div class="sbn">LLM Gateway</div><div class="sbv">v5.2 · 模型+写作面板</div></div>
  <div class="sb-stats"><span id="sbTk">···</span> <span class="dot on ss-dot" id="sbDot"></span></div>
  <div class="sbtabs">
    <button class="sbtab active" onclick="switchTab(0)"><span class="si">⌘</span> 仪表盘</button>
    <button class="sbtab" onclick="switchTab(1)"><span class="si">🔌</span> 模型</button>
    <button class="sbtab" onclick="switchTab(2)"><span class="si">✍️</span> 写作</button>
    <button class="sbtab" onclick="switchTab(3)"><span class="si">⚙️</span> 设置</button>
  </div>
  <div class="sb-foot">
    <button class="btn pri full sm" onclick="sheetAdd()">＋ 添加提供商</button>
  </div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div class="app" id="appMain">
  <!-- Mobile status bar -->
  <div class="stbar">
    <span class="st-l">~/llm-gateway</span>
    <span class="st-r"><span id="stTk">···</span> <span class="dot on" id="stDot2"></span></span>
  </div>

  <div class="pages" id="pages">
    <!-- Dashboard -->
    <div class="page active" id="pg-dash">
      <div class="desk-layout">
        <div class="desk-list" id="dashList">
          <div class="hero" style="margin-bottom:8px"><h1>LLM Gateway</h1><div class="sub">v5.2 · 手机端+桌面双模式</div></div>
          <div class="stat3" id="statsRow"><div class="skel" style="height:50px"></div><div class="skel" style="height:50px"></div><div class="skel" style="height:50px"></div></div>
          <div class="sec"><span class="st">提供商</span><span class="sa" id="provCount">0</span></div>
          <div id="dashProvs"><div class="skel" style="height:44px"></div></div>
        </div>
        <div class="detail-panel" id="dashDetail">
          <div class="dp-empty"><div class="dpe-ic">🔌</div><div>选择提供商查看详情</div></div>
        </div>
      </div>
    </div>

    <!-- Models -->
    <div class="page" id="pg-models">
      <div class="desk-layout">
        <div class="desk-list">
          <div class="sec"><span class="st">模型列表</span></div>
          <div id="modelList"><div class="skel" style="height:44px"></div></div>
        </div>
        <div class="detail-panel" id="modelDetail">
          <div class="dp-empty"><div class="dpe-ic">🔌</div><div>选择提供商查看模型</div></div>
        </div>
      </div>
    </div>

    <!-- Writing -->
    <div class="page" id="pg-write">
      <div class="pi" style="display:flex;flex-direction:column;flex:1;padding-top:6px;padding-bottom:6px">
        <div class="chips-row" id="chipsRow">
          <span class="chip-w" onclick="quickChat('写第1章，3000字，开篇直接冲突')">✍️ 写第1章</span>
          <span class="chip-w" onclick="quickChat('分析我的写作风格优缺点')">🔍 分析文风</span>
          <span class="chip-w" onclick="quickChat('给我主角起3个名字并说明理由')">👤 起名</span>
          <span class="chip-w" onclick="quickChat('规划接下来5章的大纲')">📋 大纲</span>
          <span class="chip-w" onclick="quickChat('检查下面内容的AI味并改写')">🔬 去AI味</span>
        </div>
        <div class="chat-body" id="chatBody">
          <div class="chat-empty-w" id="chatEmpty"><div class="ce-ic">✍️</div><div class="ce-t">AI 写作对话</div><div class="ce-s">选择提供商，告诉 AI 你想写什么</div></div>
        </div>
        <div class="chat-foot">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
            <select class="inp" id="chatProv" style="margin-bottom:0;font-size:.42rem;padding:4px 8px;flex:1"></select>
          </div>
          <div class="chat-inp">
            <textarea id="chatInput" rows="1" placeholder="告诉 AI 你想写什么..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
            <button class="snd" id="sendBtn" onclick="sendChat()">↑</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Settings -->
    <div class="page" id="pg-set">
      <div class="pi">
        <div class="sec"><span class="st">提供商管理</span><button class="btn sm" style="margin-left:auto" onclick="sheetAdd()">＋</button></div>
        <div id="setProvs"><div class="empty">加载中...</div></div>
        <div class="sec"><span class="st">统计</span></div>
        <div id="tokInfo"><div class="skel" style="height:44px"></div></div>
        <button class="btn dan sm" style="margin-top:6px" onclick="resetTok()">重置统计</button>
        <div class="sec"><span class="st">关于</span></div>
        <div style="font-size:.42rem;color:var(--t3);font-family:var(--fm);line-height:1.6">
          LLM Gateway Dashboard v5.2<br>FastAPI + 纯前端 · 零依赖<br>移动端+桌面双模式 · 鲁班打磨
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Tab Bar -->
  <nav class="tabbar">
    <button class="tab active" data-idx="0"><span class="tic">⌘</span>仪表盘</button>
    <button class="tab" data-idx="1"><span class="tic">🔌</span>模型</button>
    <button class="tab" data-idx="2"><span class="tic">✍️</span>写作</button>
    <button class="tab" data-idx="3"><span class="tic">⚙️</span>设置</button>
  </nav>
</div>

<!-- ═══ SHEETS (mobile bottom / desktop hidden) ═══ -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sh"></div>
  <div class="shead"><h4 id="sheetTitle">详情</h4><button class="sclose" onclick="closeSheet()">✕</button></div>
  <div class="sbody" id="sheetBody"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const S={provs:[],curTab:0,selPid:'',chatMsgs:[],chatPid:''};
const T=id=>document.getElementById(id);
const E=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const isDesktop=()=>window.innerWidth>=768;

function switchTab(idx){
  S.curTab=idx;
  document.querySelectorAll('.page').forEach((e,i)=>e.classList.toggle('active',i===idx));
  document.querySelectorAll('.tab').forEach((e,i)=>e.classList.toggle('active',i===idx));
  document.querySelectorAll('.sbtab').forEach((e,i)=>e.classList.toggle('active',i===idx));
  if(idx===0)loadDash();if(idx===1)loadModels();if(idx===2)loadWrite();if(idx===3)loadSettings();
}
document.querySelectorAll('.tab').forEach((t,i)=>t.onclick=()=>switchTab(i));
document.querySelectorAll('.sbtab').forEach((t,i)=>t.onclick=()=>switchTab(i));

let _tt;
function toast(msg,type=''){
  let t=T('toast');t.textContent=msg;t.className='toast show '+type;
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),1800);
}

function openSheet(title,html){
  if(isDesktop()){
    // Desktop: render in a full-page overlay
    T('sheetTitle').textContent=title;T('sheetBody').innerHTML=html;
    T('sheet').style.cssText='position:fixed;inset:0;z-index:100;background:var(--s1);display:flex;flex-direction:column;overflow-y:auto;max-width:560px;margin:40px auto;border-radius:12px;border:1px solid var(--bd);max-height:calc(100vh - 80px)';
  }else{
    T('sheetTitle').textContent=title;T('sheetBody').innerHTML=html;
    T('overlay').classList.add('show');T('sheet').classList.add('show');
  }
}
function closeSheet(){
  T('overlay').classList.remove('show');T('sheet').classList.remove('show');
  T('sheet').style.cssText='';
  if(isDesktop()&&S.selPid)loadDetail(S.selPid);
  loadDash();
}

async function api(u,o={}){
  let r=await fetch(u,{headers:{'Content-Type':'application/json',...o.headers},...o});
  if(!r.ok){let e=await r.json().catch(()=>({}));throw new Error(e.detail||`HTTP ${r.status}`)}
  return r.json();
}

function updateStatus(tk){let v=tk>=1e3?(tk/1e3).toFixed(1)+'K':String(tk);T('stTk')&&(T('stTk').textContent=v);T('sbTk')&&(T('sbTk').textContent=v)}

// ═══ Dashboard ═══
async function loadDash(){
  try{
    let[h,p]=await Promise.all([api('/api/health'),api('/api/providers')]);
    S.provs=p.providers||[];
    updateStatus(h.total_tokens);
    T('statsRow').innerHTML=`<div class="stat"><div class="sv">${h.providers_count}</div><div class="sl">提供商</div></div>
      <div class="stat"><div class="sv">${h.models_count}</div><div class="sl">模型</div></div>
      <div class="stat"><div class="sv">${h.total_requests}</div><div class="sl">请求</div></div>`;
    T('provCount')&&(T('provCount').textContent=h.providers_count);
    let html=S.provs.length?S.provs.map(p=>`<div class="pcard${S.selPid===p.id?' sel':''}" onclick="${isDesktop()?'loadDetail(\"'+p.id+'\")':'openProvSheet(\"'+p.id+'\")'}">
      <div class="pr"><div class="pav">🔌</div><div class="pi"><div class="pn">${E(p.name)}</div><div class="pu">${E(p.model||'')}</div></div>
      <span class="badge ${p.model_count?'ok':'info'}">${p.model_count||0}模型</span><span class="chev">›</span></div></div>`).join(''):'<div class="empty">暂无提供商</div>';
    T('dashProvs').innerHTML=html;
    if(isDesktop()&&S.selPid)loadDetail(S.selPid);
  }catch(e){}
}

// ═══ Desktop Detail Panel ═══
async function loadDetail(pid){
  S.selPid=pid;
  let p=S.provs.find(x=>x.id===pid);if(!p)return;
  let ms=(p.cached_models||[]).slice(0,50);
  let panel=T('dashDetail')||T('modelDetail');
  if(!panel)return;
  panel.innerHTML=`<div class="dp-head"><h3>${E(p.name)}</h3><button class="btn sm" onclick="sheetAdd()">编辑</button></div>
    <div class="detail-panel-inner">
      <div class="dp-meta">${E(p.base_url)} · ${E(p.model||'未设置')}</div>
      <div style="display:flex;gap:6px;margin-bottom:14px">
        <button class="btn pri sm" id="btnTestD" onclick="testProvDesk('${pid}')">🔍 测试连接</button>
        <button class="btn sm" onclick="checkBalDesk('${pid}')">💰 查余额</button>
        <button class="btn dan sm" onclick="delProv('${pid}')">🗑</button>
      </div>
      <div id="provResD"></div>
      <div class="sec"><span class="st">模型列表</span><span class="sa">${ms.length}个</span></div>
      <div class="mlist">${ms.length?ms.map(m=>`<div class="mitem"><span class="mid">${E(m.id)}</span><span class="mby">${E(m.owned_by)}</span></div>`).join(''):'<div class="empty">点击"测试连接"获取模型列表</div>'}</div>
    </div>`;
  // Highlight selected in list
  document.querySelectorAll('#dashList .pcard,#modelList .pcard').forEach(c=>c.classList.remove('sel'));
}
async function testProvDesk(pid){
  let res=T('provResD');res.innerHTML='<div class="pulse" style="text-align:center;padding:8px;color:var(--t3);font-family:var(--fm)">测试中...</div>';
  try{
    let r=await api('/api/providers/'+pid+'/test',{method:'POST'});
    if(r.connected){res.innerHTML=`<div class="result ok">✓ 连接成功 · ${r.model_count}个模型</div>`;toast('连接成功','good');
      loadDash();setTimeout(()=>loadDetail(pid),300);
    }else{res.innerHTML=`<div class="result err">✗ ${E(r.error||'')}\n${E(r.detail||'')}</div>`;toast('连接失败','bad')}
  }catch(e){res.innerHTML=`<div class="result err">✗ ${E(e.message)}</div>`}
}
async function checkBalDesk(pid){
  let res=T('provResD');res.innerHTML='<div class="pulse" style="text-align:center;padding:8px;color:var(--t3);font-family:var(--fm)">查询中...</div>';
  try{
    let r=await api('/api/providers/'+pid+'/balance',{method:'POST'});
    if(r.source==='billing_api'){res.innerHTML=`<div class="result ok">💰 硬上限: $${r.hard_limit_usd||0} · 软上限: $${r.soft_limit_usd||0} · 到期: ${r.access_until||'?'}</div>`;toast('余额已获取','good')}
    else if(r.source==='test_call'&&r.credits_available){res.innerHTML=`<div class="result ok">💰 额度可用 ✓</div>`;toast('正常','good')}
    else{res.innerHTML=`<div class="result">ℹ 该提供商不支持余额查询 (${r.source})</div>`}
  }catch(e){res.innerHTML=`<div class="result err">查询失败: ${E(e.message)}</div>`}
}

// ═══ Mobile Provider Sheet ═══
async function openProvSheet(pid){
  let p=S.provs.find(x=>x.id===pid);if(!p)return;
  let ms=(p.cached_models||[]).slice(0,40);
  openSheet(E(p.name),`
    <div style="font-size:.48rem;color:var(--t2);font-family:var(--fm);margin-bottom:8px">${E(p.base_url)}</div>
    <div class="fg"><label>默认模型</label><div style="font-size:.5rem;color:var(--t1);font-family:var(--fm)">${E(p.model||'未设置')}</div></div>
    <div style="display:flex;gap:5px;margin-bottom:10px">
      <button class="btn pri sm" style="flex:1" id="btnTest" onclick="testProvSheet('${pid}')">🔍 测试连接</button>
      <button class="btn sm" style="flex:1" onclick="checkBalSheet('${pid}')">💰 查余额</button>
    </div>
    <div id="sheetRes"></div>
    <div class="sec"><span class="st">模型列表</span><span class="sa">${ms.length}个</span></div>
    <div class="mlist">${ms.length?ms.map(m=>`<div class="mitem"><span class="mid">${E(m.id)}</span><span class="mby">${E(m.owned_by)}</span></div>`).join(''):'<div class="empty">点击"测试连接"获取</div>'}</div>
    <button class="btn dan full" style="margin-top:10px" onclick="delProv('${pid}')">🗑 删除</button>
  `);
}
async function testProvSheet(pid){let r=T('sheetRes');r.innerHTML='<div class="pulse">测试中...</div>';
  try{let d=await api('/api/providers/'+pid+'/test',{method:'POST'});
    if(d.connected){r.innerHTML=`<div class="result ok">✓ 连接成功 · ${d.model_count}个模型</div>`;toast('成功','good');closeSheet();loadDash();setTimeout(()=>openProvSheet(pid),300)}
    else{r.innerHTML=`<div class="result err">✗ ${E(d.error||'')}</div>`;toast('失败','bad')}
  }catch(e){r.innerHTML=`<div class="result err">${E(e.message)}</div>`}
}
async function checkBalSheet(pid){let r=T('sheetRes');r.innerHTML='<div class="pulse">查询中...</div>';
  try{let d=await api('/api/providers/'+pid+'/balance',{method:'POST'});
    if(d.source==='billing_api')r.innerHTML=`<div class="result ok">💰 硬上限: $${d.hard_limit_usd||0} · 到期: ${d.access_until||'?'}</div>`;
    else if(d.source==='test_call')r.innerHTML=`<div class="result ok">💰 额度可用 ✓</div>`;
    else r.innerHTML=`<div class="result">ℹ 不支持余额查询</div>`;
  }catch(e){r.innerHTML=`<div class="result err">${E(e.message)}</div>`}
}

// ═══ Models Tab ═══
async function loadModels(){
  try{S.provs=(await api('/api/providers')).providers||[];
    let html=S.provs.length?S.provs.map(p=>{let m=p.cached_models||[];
      return `<div class="pcard${S.selPid===p.id?' sel':''}" onclick="${isDesktop()?'loadDetailM(\"'+p.id+'\")':'switchTab(0);openProvSheet(\"'+p.id+'\")'}">
        <div class="pr"><div class="pav">🔌</div><div class="pi"><div class="pn">${E(p.name)}</div><div class="pu">${E(p.base_url)}</div></div>
        <span class="badge ${p.model_count?'ok':'info'}">${p.model_count||0}</span><span class="chev">›</span></div>
        ${m.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;padding-top:5px;border-top:1px solid var(--bd)">${m.slice(0,12).map(m=>`<span style="font-size:.36rem;padding:2px 5px;border-radius:4px;background:var(--s3);color:var(--t2);font-family:var(--fm)">${E((m.id.split('/').pop()||m.id).slice(0,20))}</span>`).join('')}${m.length>12?`<span style="font-size:.36rem;color:var(--t3);font-family:var(--fm)">+${m.length-12}</span>`:''}</div>`:''}
      </div>`}).join(''):'<div class="empty">暂无提供商</div>';
    T('modelList').innerHTML=html;
    if(isDesktop()&&S.selPid)loadDetailM(S.selPid);
  }catch(e){}
}
async function loadDetailM(pid){S.selPid=pid;let panel=T('modelDetail');if(!panel)return;await loadDetail(pid);
  document.querySelectorAll('#modelList .pcard').forEach(c=>c.classList.remove('sel'));
}

// ═══ Settings ═══
async function loadSettings(){
  try{let[p,tk]=await Promise.all([api('/api/providers'),api('/api/tokens')]);S.provs=p.providers||[];
    T('setProvs').innerHTML=S.provs.length?S.provs.map(p=>`<div class="pcard" style="cursor:default">
      <div class="pr"><div class="pav">🔌</div><div class="pi"><div class="pn">${E(p.name)}</div><div class="pu">${E(p.model||'未设置')} · ${E(p.base_url)}</div></div></div>
      <div class="pa"><button class="btn sm pri" onclick="isDesktop()?loadDetail('${p.id}'):openProvSheet('${p.id}')">详情</button>
      <button class="btn sm dan" onclick="delProv('${p.id}')">删除</button></div></div>`).join(''):'<div class="empty">暂无</div>';
    T('tokInfo').innerHTML=`<div class="stat3"><div class="stat"><div class="sv">${tk.total_requests||0}</div><div class="sl">请求</div></div><div class="stat"><div class="sv">${tk.total_tokens||0}</div><div class="sl">Token</div></div><div class="stat"><div class="sv">${tk.total_tests||0}</div><div class="sl">测试</div></div></div>`;
  }catch(e){}
}
async function delProv(pid){if(!confirm('删除？'))return;
  try{await api('/api/providers/'+pid,{method:'DELETE'});S.selPid='';closeSheet();loadDash();loadModels();loadSettings();toast('已删除','good')}catch(e){toast(e.message,'bad')}
}
function sheetAdd(){
  openSheet('添加提供商',`<div class="fg"><label>名称</label><input class="inp" id="spName" placeholder="DeepSeek / OpenAI"></div>
    <div class="fg"><label>API 地址</label><input class="inp" id="spUrl" placeholder="https://api.openai.com/v1" value="https://api.openai.com/v1"></div>
    <div class="fg"><label>API Key</label><input class="inp" id="spKey" type="password" placeholder="sk-..."></div>
    <div class="fg"><label>默认模型</label><input class="inp" id="spModel" placeholder="gpt-4o"></div>
    <button class="btn pri full" onclick="addProv()">添加</button>`);
}
async function addProv(){
  try{await api('/api/providers',{method:'POST',body:JSON.stringify({name:T('spName').value,base_url:T('spUrl').value,api_key:T('spKey').value,model:T('spModel').value})});
    closeSheet();loadDash();loadModels();loadSettings();toast('已添加','good')}catch(e){toast(e.message,'bad')}
}
async function resetTok(){if(!confirm('确定？'))return;await api('/api/tokens/reset',{method:'POST'});loadSettings();toast('已重置','good')}

// ═══ Writing / Chat ═══
function loadWrite(){
  if(!S.provs.length)api('/api/providers').then(p=>{S.provs=p.providers||[];renderChatProvs()});
  else renderChatProvs();
}
function renderChatProvs(){
  let sel=T('chatProv');sel.innerHTML=(S.provs.length?S.provs.map(p=>`<option value="${p.id}" ${S.chatPid===p.id?'selected':''}>${E(p.name)} · ${E(p.model||'')}</option>`).join(''):'<option>暂无提供商</option>');
  sel.onchange=()=>S.chatPid=sel.value;
  if(!S.chatPid&&S.provs.length){S.chatPid=S.provs[0].id;sel.value=S.chatPid}
}
function quickChat(text){T('chatInput').value=text;sendChat()}
async function sendChat(){
  let inp=T('chatInput'),text=inp.value.trim();if(!text||!S.chatPid)return;
  inp.value='';inp.style.height='auto';
  let body=T('chatBody'),empty=T('chatEmpty');if(empty)empty.style.display='none';
  // Add user msg
  let um=div('msg user',`<div class="m-av">👤</div><div><div class="m-bub">${E(text)}</div><div class="m-time">${now()}</div></div>`);
  body.appendChild(um);S.chatMsgs.push({role:'user',content:text});
  // Typing
  let ty=div('msg assistant','<div class="m-av">AI</div><div class="typing-dots"><span></span><span></span><span></span></div>');
  ty.id='typingInd';body.appendChild(ty);body.scrollTop=body.scrollHeight;
  T('sendBtn').disabled=true;
  try{
    let resp=await api('/api/chat',{method:'POST',body:JSON.stringify({messages:S.chatMsgs.slice(-10),provider_id:S.chatPid})});
    ty.remove();
    let am=div('msg assistant',`<div class="m-av">AI</div><div><div class="m-bub">${E(resp.content)}</div><div class="m-time">${now()}</div></div>`);
    body.appendChild(am);S.chatMsgs.push({role:'assistant',content:resp.content});
    if(resp.tokens)updateStatus(resp.tokens);
  }catch(e){ty.remove();let em=div('msg assistant',`<div class="m-av">AI</div><div><div class="m-bub">❌ ${E(e.message)}</div></div>`);body.appendChild(em)}
  T('sendBtn').disabled=false;body.scrollTop=body.scrollHeight;
}
function now(){return new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}
function div(c,h){let d=document.createElement('div');d.className=c;if(h)d.innerHTML=h;return d}

// Init
loadDash();
if('serviceWorker' in navigator){navigator.serviceWorker.register('/static/sw.js').catch(()=>{});}
</script>
</body>
</html>
